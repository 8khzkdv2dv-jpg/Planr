<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Planr">
<meta name="theme-color" content="#f5f0ff">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Planr</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#fff;--bg2:#f7f3ff;--bg3:#ede8fa;
  --text:#1a1030;--text2:#6b5f8a;--text3:#a89fbe;
  --border:#e4ddf5;--border2:#c9bfe8;
  --accent:#7c3aed;--accent2:#ede9fe;
  --green:#059669;--red:#dc2626;--amber:#d97706;--blue:#2563eb;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#0e0a1a;--bg2:#180f2e;--bg3:#221840;
  --text:#ede8ff;--text2:#9080b8;--text3:#5a4878;
  --border:#2a1f45;--border2:#3d2f60;
  --accent:#a78bfa;--accent2:#2d1f5e;
  --green:#10b981;--red:#f87171;--amber:#fbbf24;--blue:#60a5fa;
}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;color:var(--text);background:var(--bg);height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* TOP BAR */
.topbar{display:flex;align-items:center;gap:8px;padding:10px 12px;border-bottom:1px solid var(--border);background:var(--bg);flex-shrink:0;min-height:52px}
.topbar-title{font-size:17px;font-weight:700;flex:1}
.topbar-btn{width:36px;height:36px;border:1px solid var(--border2);border-radius:10px;background:transparent;color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}

/* MAIN LAYOUT */
.main{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
.sidebar{width:130px;flex-shrink:0;border-right:1px solid var(--border);background:var(--bg2);overflow-y:auto;display:flex;flex-direction:column;transition:width .2s}
.sidebar.collapsed{width:0;overflow:hidden}
.sidebar-section{padding:10px 8px 4px;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.07em}
.cal-item{display:flex;align-items:center;gap:6px;padding:7px 8px;border-radius:8px;margin:1px 4px;cursor:pointer;user-select:none}
.cal-item:active{background:var(--bg3)}
.cal-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;border:2px solid transparent}
.cal-dot.inactive{background:transparent!important}
.cal-name{font-size:12px;font-weight:500;line-height:1.2;color:var(--text);word-break:break-word}
.add-cal-btn{display:flex;align-items:center;gap:6px;padding:7px 8px;border-radius:8px;margin:2px 4px;cursor:pointer;color:var(--accent);font-size:12px;font-weight:600;border:none;background:transparent;width:calc(100% - 8px);text-align:left}
.add-cal-btn:active{background:var(--accent2)}

/* CONTENT */
.content{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column}

/* BOTTOM NAV */
.tabs-bar{display:flex;border-top:1px solid var(--border);background:var(--bg);flex-shrink:0;padding-bottom:env(safe-area-inset-bottom)}
.tab-btn{flex:1;padding:8px 0 6px;border:none;background:transparent;color:var(--text3);font-size:10px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;font-family:inherit}
.tab-btn svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.tab-btn.active{color:var(--accent);font-weight:700}

/* PANELS */
.panel{display:none;flex-direction:column;flex:1}.panel.active{display:flex}

/* CALENDAR */
.view-tabs{display:flex;gap:3px;margin-bottom:10px;background:var(--bg3);border-radius:10px;padding:3px}
.view-tab{flex:1;padding:5px 2px;border:none;background:transparent;border-radius:8px;font-size:11px;font-weight:600;color:var(--text2);cursor:pointer;font-family:inherit}
.view-tab.active{background:var(--bg);color:var(--accent)}
.cal-nav{display:flex;align-items:center;gap:6px;margin-bottom:10px}
.cal-nav h2{flex:1;text-align:center;font-size:15px;font-weight:700}
.nav-btn{width:30px;height:30px;border:1px solid var(--border2);border-radius:8px;background:transparent;color:var(--text);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.today-btn{padding:5px 10px;border:1px solid var(--border2);border-radius:8px;background:transparent;color:var(--accent);cursor:pointer;font-size:12px;font-weight:600;font-family:inherit}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);grid-auto-rows:1fr;gap:1px;margin-bottom:10px;flex:1}
.cal-dn{text-align:center;font-size:9px;color:var(--text3);font-weight:700;padding:3px 0;text-transform:uppercase}
.cal-day{border:1px solid var(--border);border-radius:6px;padding:2px;background:var(--bg);cursor:pointer;overflow:hidden;min-height:0}
.cal-day:active{background:var(--bg2)}
.cal-day.today{border-color:var(--accent);border-width:2px}
.cal-day.other{opacity:.2}
.cal-num{font-size:10px;color:var(--text2);font-weight:600;line-height:1.4}
.cal-day.today .cal-num{color:var(--accent);font-weight:800}
.ev-pill{font-size:8px;padding:1px 3px;border-radius:3px;margin-bottom:1px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;font-weight:700;line-height:1.4}
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:10px;flex:1}
.week-col{border:1px solid var(--border);border-radius:8px;overflow:hidden;display:flex;flex-direction:column}
.week-head{text-align:center;padding:5px 2px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0}
.week-head.today-h{background:var(--accent2)}
.week-dn{font-size:9px;color:var(--text3);font-weight:700;text-transform:uppercase}
.week-num{font-size:14px;font-weight:700}
.week-head.today-h .week-num{color:var(--accent)}
.week-body{padding:3px;flex:1;overflow-y:auto}
.week-ev{font-size:9px;padding:2px 3px;border-radius:3px;margin-bottom:2px;font-weight:700;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.day-ev-card{border-radius:10px;padding:10px 12px;border-left:4px solid;margin-bottom:8px}
.year-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.mini-month{background:var(--bg2);border-radius:8px;padding:6px;border:1px solid var(--border)}
.mini-title{font-size:9px;font-weight:700;text-align:center;margin-bottom:3px;color:var(--text2)}
.mini-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px}
.mini-cell{height:11px;border-radius:2px;font-size:6px;text-align:center;line-height:11px;color:var(--text3)}
.mini-cell.m-ev{background:var(--accent2);color:var(--accent);font-weight:700}
.mini-cell.m-today{background:var(--accent);color:#fff;font-weight:700}
.recur-tag{font-size:10px;color:var(--text3);background:var(--bg3);padding:2px 6px;border-radius:10px;white-space:nowrap}

/* TODO / TAKEN */
.card{background:var(--bg2);border-radius:12px;padding:12px;margin-bottom:10px;border:1px solid var(--border)}
.card-w{background:var(--bg);border-radius:12px;padding:12px;margin-bottom:10px;border:1px solid var(--border)}
.item{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)}
.item:last-child{border-bottom:none}
.lbl{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin:12px 0 6px}
.tag{display:inline-flex;align-items:center;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px}
.muted{font-size:11px;color:var(--text3)}
.circle{width:24px;height:24px;border-radius:50%;border:2px solid var(--border2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.circle.done{background:var(--green);border-color:var(--green)}
.sq{width:20px;height:20px;border-radius:4px;border:2px solid var(--border2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sq.got{background:var(--green);border-color:var(--green)}
.chksvg{display:none;width:11px;height:11px;stroke:white;fill:none;stroke-width:3;stroke-linecap:round;stroke-linejoin:round}
.circle.done .chksvg,.sq.got .chksvg{display:block}
.empty{text-align:center;padding:28px 12px;color:var(--text3);font-size:13px}
.badge{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;padding:0 4px;border-radius:9px;font-size:10px;font-weight:700;background:var(--accent);color:#fff}

/* EISENHOWER */
.ei-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px}
.ei-q{border-radius:10px;padding:8px;min-height:90px;border:1px solid}
.ei-qt{font-size:10px;font-weight:700;margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
.ei-it{font-size:11px;padding:3px 5px;border-radius:5px;margin-bottom:2px;background:rgba(255,255,255,.25);cursor:pointer}

/* SHOP */
.shop-card{border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:8px}
.shop-head{display:flex;align-items:center;gap:8px;padding:10px 12px;cursor:pointer;background:var(--bg2)}
.shop-head:active{opacity:.7}
.shop-logo{width:32px;height:32px;border-radius:7px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;overflow:hidden}
.shop-logo img{width:100%;height:100%;object-fit:cover}
.shop-nm{font-weight:700;font-size:14px;flex:1}
.shop-body{padding:10px 12px;background:var(--bg);display:none}
.shop-body.open{display:block}
.shop-cat-h{font-size:11px;font-weight:700;color:var(--text2);padding:5px 0 2px;border-bottom:1px solid var(--border);margin-top:6px}
.shop-row{display:flex;align-items:center;gap:7px;padding:5px 0;border-bottom:1px solid var(--border)}
.shop-row:last-child{border-bottom:none}

/* SETTINGS */
.st-sec{margin-bottom:18px}
.st-title{font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px}
.st-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border)}
.st-row:last-child{border-bottom:none}
.st-lbl{font-size:14px;font-weight:500}
.st-sub{font-size:11px;color:var(--text2);margin-top:1px}

/* BUTTONS */
.btn{padding:9px 14px;border:1px solid var(--border2);border-radius:9px;background:var(--bg);color:var(--text);font-size:14px;cursor:pointer;font-family:inherit;white-space:nowrap}
.btn:active{opacity:.7}
.btn-p{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-sm{padding:5px 10px;font-size:12px;border-radius:7px}
.btn-d{color:var(--red);border:none;background:transparent;padding:5px 7px;cursor:pointer;font-size:13px}
.row{display:flex;gap:7px;margin-bottom:8px;align-items:center}
.row>*{flex:1}.row>.btn{flex:0 0 auto}
input,select,textarea{width:100%;padding:9px 11px;border:1px solid var(--border2);border-radius:9px;background:var(--bg);color:var(--text);font-size:14px;font-family:inherit;appearance:none;-webkit-appearance:none}
input:focus,select:focus{outline:none;border-color:var(--accent)}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--bg);border-radius:18px 18px 0 0;padding:18px;width:100%;max-width:520px;max-height:88vh;overflow-y:auto}
.modal-t{font-size:17px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.modal-close{font-size:22px;border:none;background:none;color:var(--text2);cursor:pointer;line-height:1;padding:0 4px}
</style>
</head>
<body>

<div class="topbar">
  <button class="topbar-btn" onclick="toggleSidebar()" id="sidebar-toggle" aria-label="Agenda's">☰</button>
  <div class="topbar-title" id="topbar-title">Agenda</div>
  <button class="topbar-btn" onclick="handleTopbarAdd()" aria-label="Toevoegen">＋</button>
</div>

<div class="main">
  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-section">Mijn agenda's</div>
    <div id="cal-list"></div>
    <button class="add-cal-btn" onclick="openAddCalModal()">＋ Agenda</button>
    <div style="flex:1"></div>
  </div>

  <!-- CONTENT -->
  <div class="content" id="content">
    <div id="panel-agenda" class="panel active"></div>
    <div id="panel-taken" class="panel"></div>
    <div id="panel-todo" class="panel"></div>
    <div id="panel-winkel" class="panel"></div>
    <div id="panel-instellingen" class="panel"></div>
  </div>
</div>

<nav class="tabs-bar">
  <button class="tab-btn active" onclick="showTab('agenda',this)">
    <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    Agenda
  </button>
  <button class="tab-btn" onclick="showTab('taken',this)">
    <svg viewBox="0 0 24 24"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
    Taken
  </button>
  <button class="tab-btn" onclick="showTab('todo',this)">
    <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3" cy="6" r="1" fill="currentColor"/><circle cx="3" cy="12" r="1" fill="currentColor"/><circle cx="3" cy="18" r="1" fill="currentColor"/></svg>
    To-do
  </button>
  <button class="tab-btn" onclick="showTab('winkel',this)">
    <svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
    Winkel
  </button>
  <button class="tab-btn" onclick="showTab('instellingen',this)">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    Instellingen
  </button>
</nav>

<!-- ADD CALENDAR MODAL -->
<div id="modal-cal" class="overlay" style="display:none" onclick="if(event.target===this)closeModal('modal-cal')">
  <div class="modal">
    <div class="modal-t">Agenda toevoegen<button class="modal-close" onclick="closeModal('modal-cal')">×</button></div>
    <div class="row"><input type="text" id="cal-name-input" placeholder="Naam (bv: Werk, Privé...)"></div>
    <div class="row" style="align-items:center">
      <label style="font-size:13px;color:var(--text2);flex:0 0 auto">Kleur:</label>
      <input type="color" id="cal-color-input" value="#7c3aed" style="width:44px;height:36px;flex:0 0 44px;padding:2px;border-radius:8px;border:1px solid var(--border2)">
      <div style="flex:1"></div>
    </div>
    <div class="lbl" style="margin-top:8px">Google Agenda (optioneel)</div>
    <div style="font-size:12px;color:var(--text2);margin-bottom:8px">Plak hier de iCal-link van Google Agenda om afspraken te synchroniseren.</div>
    <div class="row"><input type="url" id="cal-ical-input" placeholder="https://calendar.google.com/calendar/ical/..."></div>
    <button class="btn btn-p" style="width:100%;margin-top:6px" onclick="addCalendar()">Toevoegen</button>
  </div>
</div>

<!-- ADD EVENT MODAL -->
<div id="modal-event" class="overlay" style="display:none" onclick="if(event.target===this)closeModal('modal-event')">
  <div class="modal">
    <div class="modal-t">Taak toevoegen<button class="modal-close" onclick="closeModal('modal-event')">×</button></div>
    <div class="row"><input type="text" id="ev-title" placeholder="Titel..."></div>
    <div class="row">
      <input type="date" id="ev-date" style="flex:1">
      <input type="time" id="ev-time" placeholder="Start" style="flex:1">
      <input type="time" id="ev-endtime" placeholder="Einde" style="flex:1">
    </div>
    <div class="row"><select id="ev-type" onchange="toggleCustomDays()">
      <option value="eenmalig">Eenmalig</option>
      <option value="dagelijks">Dagelijks</option>
      <option value="wekelijks">Wekelijks</option>
      <option value="2wekelijks">Elke 2 weken</option>
      <option value="3wekelijks">Elke 3 weken</option>
      <option value="maandelijks">Maandelijks</option>
      <option value="eerste-zondag">Eerste zondag v/d maand</option>
      <option value="custom-days">Specifieke dagen</option>
    </select></div>
    <div id="custom-days-picker" style="display:none;margin-bottom:8px">
      <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px">
        <label style="display:flex;align-items:center;gap:3px;font-size:13px"><input type="checkbox" value="1" class="dcb"> Ma</label>
        <label style="display:flex;align-items:center;gap:3px;font-size:13px"><input type="checkbox" value="2" class="dcb"> Di</label>
        <label style="display:flex;align-items:center;gap:3px;font-size:13px"><input type="checkbox" value="3" class="dcb"> Wo</label>
        <label style="display:flex;align-items:center;gap:3px;font-size:13px"><input type="checkbox" value="4" class="dcb"> Do</label>
        <label style="display:flex;align-items:center;gap:3px;font-size:13px"><input type="checkbox" value="5" class="dcb"> Vr</label>
        <label style="display:flex;align-items:center;gap:3px;font-size:13px"><input type="checkbox" value="6" class="dcb"> Za</label>
        <label style="display:flex;align-items:center;gap:3px;font-size:13px"><input type="checkbox" value="0" class="dcb"> Zo</label>
      </div>
      <select id="day-interval"><option value="1">Elke week</option><option value="2">Elke 2 weken</option><option value="3">Elke 3 weken</option></select>
    </div>
    <div class="row"><select id="ev-cal-select"></select></div>
    <div class="row"><select id="ev-taakcat-select"></select></div>
    <div class="row"><input type="text" id="ev-reminder" placeholder="Herinnering (bv: 30 min voor)"></div>
    <button class="btn btn-p" style="width:100%;margin-top:6px" onclick="addEvent()">Toevoegen</button>
  </div>
</div>

<!-- ADD TODO MODAL -->
<div id="modal-todo" class="overlay" style="display:none" onclick="if(event.target===this)closeModal('modal-todo')">
  <div class="modal">
    <div class="modal-t" id="todo-modal-title">To-do toevoegen<button class="modal-close" onclick="closeModal('modal-todo')">×</button></div>
    <input type="hidden" id="todo-edit-id">
    <div class="row"><input type="text" id="todo-txt" placeholder="Taak..."></div>
    <div class="row">
      <select id="todo-prio"><option value="normaal">Normaal</option><option value="hoog">Hoog prioriteit</option><option value="laag">Laag</option></select>
      <select id="todo-urgent"><option value="niet-urgent">Niet urgent</option><option value="urgent">Urgent</option></select>
    </div>
    <div class="row"><select id="todo-cat-sel"></select></div>
    <div class="row"><input type="text" id="todo-tags" placeholder="Tags (komma-gescheiden, bv: creatief, admin)"></div>
    <button class="btn btn-p" style="width:100%;margin-top:6px" onclick="saveTodo()">Opslaan</button>
  </div>
</div>

<!-- ADD SHOP ITEM MODAL -->
<div id="modal-shop" class="overlay" style="display:none" onclick="if(event.target===this)closeModal('modal-shop')">
  <div class="modal">
    <div class="modal-t" id="shop-modal-t">Product toevoegen<button class="modal-close" onclick="closeModal('modal-shop')">×</button></div>
    <div class="row"><input type="text" id="shop-item-nm" placeholder="Product..."></div>
    <div class="row">
      <input type="text" id="shop-qty" placeholder="Hoeveelheid" style="flex:1">
      <select id="shop-cat-sel" style="flex:2">
        <option value="groenten">🥦 Groenten</option><option value="fruit">🍎 Fruit</option>
        <option value="vlees">🥩 Vlees</option><option value="vis">🐟 Vis</option>
        <option value="zuivel">🧀 Zuivel</option><option value="brood">🍞 Brood</option>
        <option value="droog">🥫 Droog</option><option value="drank">🧃 Drank</option>
        <option value="diepvries">❄️ Diepvries</option><option value="hygiëne">🧴 Hygiëne</option>

/* ===== ICAL FETCH ===== */
const PROXIES=[
  url=>`https://corsproxy.io/?${encodeURIComponent(url)}`,
  url=>`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,
  url=>`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`
];

async function fetchIcal(calId){
  const cal=S.calendars.find(c=>c.id===calId);
  if(!cal||!cal.ical)return;
  updateCalStatus(calId,'⏳ Laden...');
  for(let i=0;i<PROXIES.length;i++){
    try{
      const proxyUrl=PROXIES[i](cal.ical);
      const r=await fetch(proxyUrl,{signal:AbortSignal.timeout(8000)});
      if(!r.ok)continue;
      let text='';
      if(i===1){// allorigins returns JSON
        const j=await r.json();text=j.contents||'';
      } else {
        text=await r.text();
      }
      if(!text||!text.includes('BEGIN:VCALENDAR')){continue;}
      cal.gcalEvents=parseIcal(text,cal.color);
      save();renderCalendar();renderCalSidebar();
      updateCalStatus(calId,`✓ ${cal.gcalEvents.length} afspraken`);
      return;
    }catch(e){continue;}
  }
  updateCalStatus(calId,'⚠️ Sync mislukt');
}

function updateCalStatus(calId,msg){
  // Store status message per calendar
  if(!S._status)S._status={};
  S._status[calId]=msg;
  // Show in settings if open
  const el=document.getElementById('cal-status-'+calId);
  if(el)el.textContent=msg;
}

function parseIcal(text,fallbackColor){
  const events=[];
  if(!text)return events;
  // Unfold lines (RFC 5545: lines ending with CRLF + whitespace are continuations)
  text=text.replace(/\r?\n[ \t]/g,'');
  const blocks=text.split('BEGIN:VEVENT');
  blocks.slice(1).forEach(block=>{
    const get=k=>{
      const m=block.match(new RegExp(k+'(?:;[^:]*)?:([^\\r\\n]+)'));
      return m?m[1].trim():'';
    };
    const dtstart=get('DTSTART');
    const dtend=get('DTEND');
    const summary=get('SUMMARY')||'(geen titel)';
    if(!dtstart)return;
    const dateStr=dtstart.replace(/T.*/,'');
    const y=dateStr.substring(0,4),mo=dateStr.substring(4,6),d=dateStr.substring(6,8);
    if(!y||!mo||!d)return;
    // Parse time if present
    let time='',endTime='';
    if(dtstart.includes('T')){
      const t=dtstart.split('T')[1];
      time=`${t.substring(0,2)}:${t.substring(2,4)}`;
    }
    if(dtend&&dtend.includes('T')){
      const t=dtend.split('T')[1];
      endTime=`${t.substring(0,2)}:${t.substring(2,4)}`;
    }
    events.push({
      id:'g'+Math.random().toString(36).slice(2),
      title:summary,
      date:`${y}-${mo}-${d}`,
      time,endTime,
      source:'gcal',
      color:fallbackColor
    });
  });
  return events;
}

function refreshAllIcal(){

function getActiveCals(){return S.calendars.filter(c=>c.active);}

function getEventsForDate(y,m,d){
  const date=new Date(y,m,d);
  const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  const activeCals=getActiveCals().map(c=>c.id);
  const result=[];

  // Own events
  S.events.filter(ev=>activeCals.includes(ev.calId)).forEach(ev=>{
    if(!ev.date)return;
    const ed=new Date(ev.date+'T00:00:00');
    let match=false;
    if(ev.type==='eenmalig')match=ev.date===ds;
    else if(date>=ed){
      const diff=Math.round((date-ed)/86400000);
      if(ev.type==='dagelijks')match=true;
      else if(ev.type==='wekelijks')match=diff%7===0;
      else if(ev.type==='2wekelijks')match=diff%14===0;
      else if(ev.type==='3wekelijks')match=diff%21===0;
      else if(ev.type==='maandelijks')match=ed.getDate()===d&&(y>ed.getFullYear()||(y===ed.getFullYear()&&m>=ed.getMonth()));
      else if(ev.type==='eerste-zondag'){
        if(date.getDay()===0){const fs=new Date(y,m,1);while(fs.getDay()!==0)fs.setDate(fs.getDate()+1);match=d===fs.getDate();}
      }
      else if(ev.type==='custom-days'&&ev.customDays){
        const dow=date.getDay();
        if(ev.customDays.includes(dow)){const interval=ev.dayInterval||1;match=diff%(interval*7)<7;}
      }
    }
    if(match){
      const cal=S.calendars.find(c=>c.id===ev.calId)||{color:'#888'};
      const taakCat=S.taakCats.find(c=>c.id===ev.taakCatId);
      const color=taakCat?taakCat.color:cal.color;
      result.push({...ev,color});
    }
  });

  // Google Calendar events
  S.calendars.filter(c=>c.active&&c.gcalEvents).forEach(cal=>{
    cal.gcalEvents.filter(ev=>ev.date===ds).forEach(ev=>{
      result.push({...ev,color:cal.color});
    });
  });

  return result;
}

function renderCalendar(){
  const el=document.getElementById('panel-agenda');
  const today=new Date();

  let nav=`<div class="view-tabs">

    <button class="today-btn" onclick="goToday()">Vandaag</button>

  let body='';
  if(curView==='maand'){
    document.getElementById('topbar-title').textContent=MONTHS[m]+' '+y;
    // Day name headers (not part of the growing grid)
    body+='<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:1px;margin-bottom:2px">';
    DAYS_S.forEach(d=>{body+=`<div class="cal-dn">${d}</div>`;});
    body+='</div>';
    // The actual grid fills remaining space
    body+='<div class="cal-grid" style="flex:1">';
    const first=new Date(y,m,1);
    let start=first.getDay()-1;if(start<0)start=6;
    const dim=new Date(y,m+1,0).getDate();
    const prev=new Date(y,m,0).getDate();
    for(let i=0;i<start;i++)body+=`<div class="cal-day other"><div class="cal-num">${prev-start+1+i}</div></div>`;
    for(let d=1;d<=dim;d++){
      const isT=d===today.getDate()&&m===today.getMonth()&&y===today.getFullYear();
      const evs=getEventsForDate(y,m,d);
      let inner=`<div class="cal-num">${d}</div>`;
      evs.slice(0,2).forEach(ev=>{inner+=`<div class="ev-pill" style="background:${ev.color}25;color:${ev.color}">${ev.title}</div>`;});
      if(evs.length>2)inner+=`<div style="font-size:8px;color:var(--text3)">+${evs.length-2}</div>`;
      body+=`<div class="cal-day${isT?' today':''}" onclick="openDay(${y},${m},${d})">${inner}</div>`;
    }
    body+='</div>';
  } else if(curView==='week'){
    const dow=viewDate.getDay();
    const mon=new Date(viewDate);mon.setDate(viewDate.getDate()-(dow===0?6:dow-1));

    // Header row
    body+=`<div style="display:flex;flex-shrink:0;border-bottom:1px solid var(--border);margin-bottom:0">
      <div style="width:44px;flex-shrink:0"></div>`;
    for(let i=0;i<7;i++){
      const d=new Date(mon);d.setDate(mon.getDate()+i);
      const isT=d.toDateString()===today.toDateString();
      body+=`<div style="flex:1;text-align:center;padding:4px 2px;${isT?'color:var(--accent);font-weight:700':''}">
        <div style="font-size:9px;color:var(--text3);text-transform:uppercase">${DAYS_S[i]}</div>
        <div style="font-size:15px;font-weight:700">${d.getDate()}</div>
      </div>`;
    }
    body+='</div>';
    // Scrollable hour grid
    body+=`<div style="flex:1;overflow-y:auto;position:relative" id="week-scroll">
      <div style="display:flex;position:relative" id="week-inner">
        <div style="width:44px;flex-shrink:0">`;
    for(let h=0;h<24;h++){
      body+=`<div style="height:60px;border-bottom:1px solid var(--border);padding:2px 4px;font-size:9px;color:var(--text3);text-align:right;line-height:1">${String(h).padStart(2,'0')}:00</div>`;
    }
    body+='</div>';
    // Day columns
    for(let i=0;i<7;i++){
      const d=new Date(mon);d.setDate(mon.getDate()+i);
      const isT=d.toDateString()===today.toDateString();
      const evs=getEventsForDate(d.getFullYear(),d.getMonth(),d.getDate());
      body+=`<div style="flex:1;position:relative;border-left:1px solid var(--border);${isT?'background:'+('var(--accent2)')+'22':''}">`;

        body+=`<div style="height:60px;border-bottom:1px solid var(--border);box-sizing:border-box"></div>`;
      }
      evs.forEach(ev=>{
        const mins=ev.time?parseInt(ev.time.split(':')[0])*60+parseInt(ev.time.split(':')[1]):0;

        const height=Math.max((durMins/60)*60,20);
        body+=`<div style="position:absolute;top:${top}px;left:2px;right:2px;height:${height}px;background:${ev.color}dd;border-radius:4px;padding:2px 4px;overflow:hidden;cursor:pointer;z-index:2" onclick="openDay(${d.getFullYear()},${d.getMonth()},${d.getDate()})">
          <div style="font-size:9px;font-weight:700;color:#fff;line-height:1.3;overflow:hidden">${ev.title}</div>
          ${ev.time?`<div style="font-size:8px;color:rgba(255,255,255,.8)">${ev.time}</div>`:''}
        </div>`;
      });
      body+='</div>';
    }
    body+='</div></div>';
  } else if(curView==='dag'){

    </div>`;
    // Scrollable hour grid
    body+=`<div style="flex:1;overflow-y:auto" id="dag-scroll">
      <div style="display:flex;position:relative">
        <div style="width:52px;flex-shrink:0">`;
    for(let h=0;h<24;h++){
      body+=`<div style="height:60px;border-bottom:1px solid var(--border);padding:2px 6px 0 0;font-size:10px;color:var(--text3);text-align:right;line-height:1">${String(h).padStart(2,'0')}:00</div>`;
    }
    body+='</div>';
    // Event column
    body+=`<div style="flex:1;position:relative;border-left:1px solid var(--border)">`;
    for(let h=0;h<24;h++){
      body+=`<div style="height:60px;border-bottom:1px solid var(--border)"></div>`;

      const [hh,mm]=ev.time.split(':').map(Number);

        const isT=d===today.getDate()&&mo===today.getMonth()&&y===today.getFullYear();
        const hasEv=getEventsForDate(y,mo,d).length>0;
        body+=`<div class="mini-cell${isT?' m-today':hasEv?' m-ev':''}">${d}</div>`;
      }
      body+='</div></div>';
    }
    body+='</div>';
  }

  // For jaar view, add button at bottom
  if(curView==='jaar'){
    body+=`<button class="btn btn-p" style="width:100%;margin-top:10px;flex-shrink:0" onclick="openAddEvent()">＋ Afspraak toevoegen</button>`;
  }
  el.innerHTML=nav+body;
  // Auto-scroll to current time for dag/week views
  if(curView==='dag'||curView==='week'){
    const scrollId=curView==='dag'?'dag-scroll':'week-scroll';
    const scrollEl=document.getElementById(scrollId);
    if(scrollEl){
      const now=new Date();
      const scrollTo=Math.max(0,(now.getHours()-1)*60);
      scrollEl.scrollTop=scrollTo;
    }
  }
  el.innerHTML=nav+body;
  // Re-set title for month view
  const titleEl=document.getElementById('cal-title');
  if(titleEl){
    if(curView==='maand')titleEl.textContent=MONTHS[m]+' '+y;
    else if(curView==='jaar')titleEl.textContent=String(y);
    else if(curView==='dag')titleEl.textContent=`${viewDate.getDate()} ${MONTHS[m]}`;
    else titleEl.textContent='';
  }
}

function addEvent(){
  const title=document.getElementById('ev-title').value.trim();
  const date=document.getElementById('ev-date').value;
  const time=document.getElementById('ev-time').value;
  const endTime=document.getElementById('ev-endtime').value;

/* ===== TAKEN ===== */
function renderTaken(){
  const el=document.getElementById('panel-taken');
  const today=new Date();today.setHours(0,0,0,0);
  const items=[];
  for(let i=0;i<30;i++){
    const d=new Date(today);d.setDate(d.getDate()+i);
    getEventsForDate(d.getFullYear(),d.getMonth(),d.getDate()).forEach(ev=>items.push({ev,date:new Date(d)}));
  }
  const wd=['zo','ma','di','wo','do','vr','za'];
  let html=`<button class="btn btn-p" style="width:100%;margin-bottom:12px" onclick="openAddEvent()">＋ Taak toevoegen</button>`;
  if(!items.length){html+='<div class="empty">Geen taken komende 30 dagen</div>';el.innerHTML=html;return;}
  let lastDay='';
  items.forEach(({ev,date})=>{
    const dk=date.toDateString();
    const isT=date.toDateString()===today.toDateString();
    const lbl=isT?'Vandaag':`${wd[date.getDay()]} ${date.getDate()}/${date.getMonth()+1}`;
    if(dk!==lastDay){html+=`<div class="lbl">${lbl}</div>`;lastDay=dk;}
    html+=`<div class="card-w" style="border-left:4px solid ${ev.color||'#888'};padding:9px 11px">
      <div style="font-weight:600;font-size:14px">${ev.title}</div>
      <div style="display:flex;gap:5px;align-items:center;margin-top:3px;flex-wrap:wrap">
        ${ev.time?`<span class="muted">${ev.time}</span>`:''}
        ${ev.source==='gcal'?'<span class="tag" style="background:#e8f0fe;color:#1a56db;font-size:10px">Google</span>':''}
        <span class="recur-tag">${RECUR_L[ev.type]||ev.type||''}</span>
        ${!ev.source?`<button class="btn-d" style="margin-left:auto" onclick="delEvent('${ev.id}')">✕</button>`:''}
      </div>
    </div>`;
  });
  el.innerHTML=html;
}

function openEditTodo(id){
  const t=S.todos.find(t=>t.id===id);if(!t)return;
  document.getElementById('todo-modal-title').innerHTML='To-do bewerken<button class="modal-close" onclick="closeModal(\'modal-todo\')">×</button>';

function saveTodo(){
  const text=document.getElementById('todo-txt').value.trim();if(!text)return;
  const prio=document.getElementById('todo-prio').value;
  const urgent=document.getElementById('todo-urgent').value;
  const cat=document.getElementById('todo-cat-sel').value;
  const tags=document.getElementById('todo-tags').value.split(',').map(t=>t.trim()).filter(Boolean);
  const editId=document.getElementById('todo-edit-id').value;
  if(editId){
    const t=S.todos.find(t=>t.id===editId);
    if(t){t.text=text;t.prio=prio;t.urgent=urgent;t.cat=cat;t.tags=tags;}
  } else {
    S.todos.push({id:Date.now()+'',text,prio,urgent,cat,tags,done:false});
  }
  save();closeModal('modal-todo');renderTodo();
}

function addTodo(){saveTodo();} // backwards compat
function toggleTodo(id){const t=S.todos.find(t=>t.id===id);if(t){t.done=!t.done;save();renderTodo();}}
function delTodo(id){S.todos=S.todos.filter(t=>t.id!==id);save();renderTodo();}

function setTodoView(v){
  curTodoView=v;
  document.querySelectorAll('#panel-todo .view-tab').forEach(b=>b.classList.toggle('active',b.dataset.v===v));
  renderTodo();
}

function renderTodo(){
  const el=document.getElementById('panel-todo');
  let views=`<div class="view-tabs" style="margin-bottom:10px">
    <button class="view-tab${curTodoView==='lijst'?' active':''}" data-v="lijst" onclick="setTodoView('lijst')">Lijst</button>
    <button class="view-tab${curTodoView==='matrix'?' active':''}" data-v="matrix" onclick="setTodoView('matrix')">Eisenhower</button>
  </div>`;
  let html=views+`<button class="btn btn-p" style="width:100%;margin-bottom:12px" onclick="openAddTodo()">＋ To-do toevoegen</button>`;
  if(curTodoView==='matrix'){el.innerHTML=html;renderEisenhower(el,html);return;}

  const active=S.todos.filter(t=>!t.done);
  const done=S.todos.filter(t=>t.done);
  if(!S.todos.length){el.innerHTML=html+'<div class="empty">Nog geen to-dos</div>';return;}

  const catMap={};
  active.forEach(t=>{if(!catMap[t.cat])catMap[t.cat]=[];catMap[t.cat].push(t);});
  S.todoCats.forEach(cat=>{
    const todos=catMap[cat.id];if(!todos||!todos.length)return;
    html+=`<div style="margin-bottom:14px">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">
        <div style="width:10px;height:10px;border-radius:50%;background:${cat.color}"></div>
        <span style="font-weight:700;font-size:14px;color:${cat.color}">${cat.name}</span>
        <span class="badge" style="background:${cat.color}">${todos.length}</span>
      </div>`;
    const tagMap={__none:[]};
    todos.forEach(t=>{if(!t.tags||!t.tags.length)tagMap.__none.push(t);else t.tags.forEach(tag=>{if(!tagMap[tag])tagMap[tag]=[];tagMap[tag].push(t);});});
    Object.entries(tagMap).forEach(([tag,items])=>{
      if(!items.length)return;
      if(tag!=='__none')html+=`<div class="lbl" style="margin-left:16px">${tag}</div>`;
      html+=`<div class="card-w" style="border-left:3px solid ${cat.color};padding:7px 10px">`;
      items.forEach(t=>{
        const pb=t.prio==='hoog'?`<span class="tag" style="background:#fee2e2;color:#dc2626">Hoog</span>`:t.prio==='laag'?`<span class="tag" style="background:var(--bg3);color:var(--text2)">Laag</span>`:'';
        const ub=t.urgent==='urgent'?`<span class="tag" style="background:#fef3c7;color:#d97706">Urgent</span>`:'';
        html+=`<div class="item">
          <div class="circle${t.done?' done':''}" onclick="toggleTodo('${t.id}')">
            <svg class="chksvg" viewBox="0 0 11 11"><polyline points="1.5 5.5 4.5 8.5 9.5 2.5"/></svg>
          </div>
          <span style="flex:1;font-size:13px">${t.text}</span>
          ${pb}${ub}
          <button style="border:none;background:transparent;color:var(--text3);cursor:pointer;font-size:14px;padding:3px 5px" onclick="openEditTodo('${t.id}')" title="Bewerken">✏️</button>
          <button class="btn-d" onclick="delTodo('${t.id}')">✕</button>
        </div>`;
      });
      html+='</div>';
    });
    html+='</div>';
  });
  if(done.length){
    html+=`<div class="lbl">Afgerond (${done.length})</div><div class="card" style="opacity:.55">`;
    done.forEach(t=>{
      html+=`<div class="item">
        <div class="circle done" onclick="toggleTodo('${t.id}')">
          <svg class="chksvg" viewBox="0 0 11 11"><polyline points="1.5 5.5 4.5 8.5 9.5 2.5"/></svg>
        </div>
        <span style="flex:1;font-size:13px;text-decoration:line-through">${t.text}</span>
        <button style="border:none;background:transparent;color:var(--text3);cursor:pointer;font-size:14px;padding:3px 5px" onclick="openEditTodo('${t.id}')">✏️</button>
        <button class="btn-d" onclick="delTodo('${t.id}')">✕</button>
      </div>`;
    });
    html+='</div>';
  }
  el.innerHTML=html;
}

function renderEisenhower(el,prefix){
  const active=S.todos.filter(t=>!t.done);
  const q1=active.filter(t=>t.prio==='hoog'&&t.urgent==='urgent');
  const q2=active.filter(t=>t.prio==='hoog'&&t.urgent!=='urgent');
  const q3=active.filter(t=>t.prio!=='hoog'&&t.urgent==='urgent');
  const q4=active.filter(t=>t.prio!=='hoog'&&t.urgent!=='urgent');
  const q=(title,items,bg,bc,tc)=>{
    let h=`<div class="ei-q" style="background:${bg};border-color:${bc}"><div class="ei-qt" style="color:${tc}">${title}</div>`;
    if(!items.length)h+=`<div style="font-size:11px;color:${tc};opacity:.4">Leeg</div>`;
    items.forEach(t=>{h+=`<div class="ei-it" style="display:flex;align-items:center;gap:4px">
      <span style="flex:1;cursor:pointer" onclick="toggleTodo('${t.id}')">${t.text}</span>
      <button onclick="openEditTodo('${t.id}')" style="border:none;background:transparent;color:${tc};opacity:.6;cursor:pointer;font-size:12px;padding:1px 3px;flex-shrink:0">✏️</button>
    </div>`});
    return h+'</div>';
  };
  el.innerHTML=prefix+`<div class="ei-grid">
    ${q('🔥 Doe nu',q1,'#fee2e222','#dc2626','#dc2626')}
    ${q('📅 Plan in',q2,'#dbeafe22','#2563eb','#2563eb')}
    ${q('🤝 Delegeer',q3,'#fef3c722','#d97706','#d97706')}
    ${q('🗑 Elimineer',q4,'var(--bg3)','var(--border)','var(--text2)')}
  </div>
  <div style="display:flex;gap:10px;font-size:10px;color:var(--text3);justify-content:center;flex-wrap:wrap">
    <span>🔥 Urgent + hoog</span><span>📅 Niet urgent + hoog</span><span>🤝 Urgent + laag</span><span>🗑 Niet urgent + laag</span>
  </div>`;
}

function openAddStore(){
  const name=prompt('Naam van de winkel?');
  if(!name)return;
  if(!S.stores.includes(name)){S.stores.push(name);S.shops[name]=[];}
  save();activeStore=name;renderWinkel();
}
function renderWinkel(){
  const el=document.getElementById('panel-winkel');
  let html=`<div class="card">
    <div class="row">
      <input type="text" id="shop-new-nm" placeholder="Nieuwe winkel...">
      <button class="btn btn-p btn-sm" onclick="quickAddStore()">＋ Winkel</button>
    </div>
    <div style="margin-top:6px">
      <div style="font-size:12px;color:var(--text2);margin-bottom:4px">Logo uploaden:</div>
      <div class="row">
        <select id="logo-store-sel" style="flex:1">${S.stores.map(s=>`<option value="${s}">${s}</option>`).join('')}</select>
        <input type="file" id="logo-file" accept="image/*" style="display:none" onchange="doLogoUpload()">
        <button class="btn btn-sm" onclick="document.getElementById('logo-file').click()">📷 Upload</button>
      </div>
    </div>
  </div>`;
  if(!S.stores.length){html+='<div class="empty">Nog geen winkels</div>';el.innerHTML=html;return;}
  S.stores.forEach(store=>{
    const items=S.shops[store]||[];
    const rem=items.filter(i=>!i.got).length;
    const logo=S.storeLogos[store];
    const logoHtml=logo?`<img src="${logo}" alt="">`:'🛒';
    const isOpen=activeStore===store;
    html+=`<div class="shop-card">
      <div class="shop-head" onclick="toggleStore('${store}')">
        <div class="shop-logo">${logoHtml}</div>
        <span class="shop-nm">${store}</span>
        ${rem>0?`<span class="badge">${rem}</span>`:''}
        <span style="color:var(--text3)">${isOpen?'▾':'▸'}</span>
      </div>
      <div class="shop-body${isOpen?' open':''}">`;
    if(isOpen){
      html+=`<button class="btn btn-p btn-sm" style="width:100%;margin-bottom:8px" onclick="openShopItem('${store}')">＋ Product</button>`;
      const bycat={};items.forEach(it=>{if(!bycat[it.cat])bycat[it.cat]=[];bycat[it.cat].push(it);});
      let has=false;
      CAT_ORDER.forEach(cat=>{
        if(!bycat[cat]||!bycat[cat].length)return;has=true;
        html+=`<div class="shop-cat-h">${CAT_ICONS[cat]} ${cat.charAt(0).toUpperCase()+cat.slice(1)}</div>`;
        bycat[cat].forEach(it=>{
          html+=`<div class="shop-row">
            <div class="sq${it.got?' got':''}" onclick="toggleShop('${store}','${it.id}')">
              <svg class="chksvg" viewBox="0 0 11 11"><polyline points="1.5 5.5 4.5 8.5 9.5 2.5"/></svg>
            </div>
            <span style="flex:1;font-size:14px;${it.got?'opacity:.35;text-decoration:line-through':''}">${it.name}</span>
            ${it.qty?`<span class="muted">${it.qty}</span>`:''}
            <button class="btn-d" onclick="delShopItem('${store}','${it.id}')">✕</button>
          </div>`;
        });
      });
      if(!has)html+='<div class="empty" style="padding:12px">Nog geen producten</div>';
      html+=`<div style="display:flex;gap:6px;margin-top:8px">
        <button class="btn btn-sm" style="flex:1" onclick="clearGot('${store}')">Afgevinkte wissen</button>
        <button class="btn-d btn-sm" onclick="delStore('${store}')">Verwijder winkel</button>
      </div>`;
    }
    html+='</div></div>';
  });
  el.innerHTML=html;
}
function quickAddStore(){
  const name=document.getElementById('shop-new-nm').value.trim();if(!name)return;
  if(!S.stores.includes(name)){S.stores.push(name);S.shops[name]=[];}
  save();activeStore=name;renderWinkel();
}
function toggleStore(s){activeStore=activeStore===s?null:s;renderWinkel();}
function openShopItem(store){
  activeStore=store;
  document.getElementById('shop-modal-t').innerHTML=`Product — ${store}<button class="modal-close" onclick="closeModal('modal-shop')">×</button>`;
  document.getElementById('shop-item-nm').value='';document.getElementById('shop-qty').value='';
  openModal('modal-shop');
}
function addShopItem(){
  if(!activeStore)return;
  const name=document.getElementById('shop-item-nm').value.trim();if(!name)return;
  const qty=document.getElementById('shop-qty').value.trim();
  const cat=document.getElementById('shop-cat-sel').value;
  S.shops[activeStore]=S.shops[activeStore]||[];
  S.shops[activeStore].push({id:Date.now()+'',name,qty,cat,got:false});
  save();closeModal('modal-shop');renderWinkel();
}
function toggleShop(store,id){const it=(S.shops[store]||[]).find(i=>i.id===id);if(it){it.got=!it.got;save();renderWinkel();}}
function delShopItem(store,id){if(S.shops[store])S.shops[store]=S.shops[store].filter(i=>i.id!==id);save();renderWinkel();}
function clearGot(store){if(S.shops[store])S.shops[store]=S.shops[store].filter(i=>!i.got);save();renderWinkel();}
function delStore(store){
  if(!confirm(`"${store}" verwijderen?`))return;
  S.stores=S.stores.filter(s=>s!==store);delete S.shops[store];delete S.storeLogos[store];
  if(activeStore===store)activeStore=null;save();renderWinkel();
}
function doLogoUpload(){
  const store=document.getElementById('logo-store-sel').value;
  const file=document.getElementById('logo-file').files[0];
  if(!file||!store)return;
  const r=new FileReader();r.onload=e=>{S.storeLogos[store]=e.target.result;save();renderWinkel();};r.readAsDataURL(file);
}

      </div>
      <div style="display:flex;gap:5px;align-items:center;flex-shrink:0">
        <input type="color" value="${c.color}" onchange="updateCalColor('${c.id}',this.value)" style="width:28px;height:24px;border:none;border-radius:5px;cursor:pointer;background:none">
        ${c.ical?`<button class="btn btn-sm" onclick="fetchIcal('${c.id}')">↻</button>`:''}
        ${c.id!=='eigen'?`<button class="btn-d" onclick="deleteCalendar('${c.id}')">✕</button>`:''}
      </div>
    </div>`).join('');
}
function updateCalColor(id,color){const c=S.calendars.find(c=>c.id===id);if(c){c.color=color;save();renderCalSidebar();}}

function renderTaakCatsManage(){
  const el=document.getElementById('taak-cats-manage');if(!el)return;
  el.innerHTML=S.taakCats.map(c=>`
    <div class="st-row">
      <div style="display:flex;align-items:center;gap:8px">
        <div style="width:12px;height:12px;border-radius:50%;background:${c.color}"></div>
        <span>${c.name}</span>
      </div>
      <div style="display:flex;gap:6px;align-items:center">
        <input type="color" value="${c.color}" onchange="updateTaakCatColor('${c.id}',this.value)" style="width:30px;height:26px;border:none;border-radius:6px;cursor:pointer;background:none">
        <button class="btn-d" onclick="delTaakCat('${c.id}')">✕</button>
      </div>
    </div>`).join('');
}
function addTaakCat(){
  const name=document.getElementById('new-taakcat-name').value.trim();
  const color=document.getElementById('new-taakcat-color').value;
  if(!name)return;
  S.taakCats.push({id:Date.now()+'',name,color});save();
  renderTaakCatsManage();document.getElementById('new-taakcat-name').value='';
}
function delTaakCat(id){S.taakCats=S.taakCats.filter(c=>c.id!==id);save();renderTaakCatsManage();}
function updateTaakCatColor(id,color){const c=S.taakCats.find(c=>c.id===id);if(c){c.color=color;save();}}
function setAccent(color){document.documentElement.style.setProperty('--accent',color);}

function renderTodoCatsManage(){
  const el=document.getElementById('todo-cats-manage');if(!el)return;
  el.innerHTML=S.todoCats.map(c=>`
    <div class="st-row">
      <div style="display:flex;align-items:center;gap:8px">
        <div style="width:12px;height:12px;border-radius:50%;background:${c.color}"></div>
        <span>${c.name}</span>
      </div>
      <div style="display:flex;gap:6px;align-items:center">
        <input type="color" value="${c.color}" onchange="updateTCColor('${c.id}',this.value)" style="width:30px;height:26px;border:none;border-radius:6px;cursor:pointer;background:none">
        <button class="btn-d" onclick="delTodoCat('${c.id}')">✕</button>
      </div>
    </div>`).join('');
}
function addTodoCat(){
  const name=document.getElementById('new-tc-name').value.trim();
  const color=document.getElementById('new-tc-color').value;
  if(!name)return;
  S.todoCats.push({id:Date.now()+'',name,color});save();
  renderTodoCatsManage();document.getElementById('new-tc-name').value='';
}
function delTodoCat(id){S.todoCats=S.todoCats.filter(c=>c.id!==id);save();renderTodoCatsManage();}
function updateTCColor(id,color){const c=S.todoCats.find(c=>c.id===id);if(c){c.color=color;save();}}
function exportData(){
  const b=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='planr-backup.json';a.click();
}
function clearAll(){if(confirm('Alles wissen?')){localStorage.removeItem(KEY);location.reload();}}

// Init
renderCalSidebar();
renderCalendar();
// Auto-refresh Google Agenda every 30 min
setInterval(refreshAllIcal, 30*60*1000);
refreshAllIcal();
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
